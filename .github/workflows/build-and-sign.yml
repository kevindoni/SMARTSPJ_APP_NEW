name: Build & Sign SmartSPJ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build frontend (Vite)
        run: npm run build

      - name: Compile Electron bytecode
        run: npm run compile:bytecode

      - name: Build Electron app (unsigned)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built artifacts
        run: dir release /s /b

      - name: Sign with SignPath
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: SmartSPJ
          signing-policy-slug: release-signing
          artifact-configuration-slug: pe-fileauthenticode
          github-artifact-id: unsigned-artifacts
          wait-for-completion: true
          output-path: signed/

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartSPJ-signed
          path: signed/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: signed/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
